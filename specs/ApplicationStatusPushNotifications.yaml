        "403":
          description: Forbidden


components:


  ###### Payload schemas #######
  schemas:
    ApplicationReceivedNotification:
      description: Schema for application received notification data
      type: object
      required: [applicationOrigin, cusip]
      properties:
        cusip:
          $ref: '#/components/schemas/cusip'
        isActionNeeded:
          type: boolean
        actionSections:
          $ref: '#/components/schemas/actionSections'
        productName:
          type: string
          maxLength: 180
        isElectronic:
          type: boolean
        isQualified:
          type: boolean
        id:
          type: string
        producers:
          $ref: '#/components/schemas/Producers'
        parties:
          type: array
          minItems: 1
          items:
            anyOf:
              - $ref: "#/components/schemas/IndividualParty"
              - $ref: "#/components/schemas/EntityParty"
        signedDate:
          type: string
          format: date
        receivedDate:
          type: string
          format: date
        rateEffectiveDate:
          type: string
          format: date
        fundsHeldUntilDate:
          type: string
          format: date
    actionSections:
      type: array
      items:
        type: string
        enum: [suitability, canSellValidation, documentReview, funding]
    notificationStatus:
      type: string
      enum: [received, inProgress, completed, cancelled]

    CanSellNotification:
      description: Schema for can sell notification data
      type: object
      allOf:
        - $ref: '#/components/schemas/CanSellValidation'
    
    SuitabilityActionNotification:
      description: Schema for suitability notification data
      type: object
      required: [policyNumber]
      allOf:
        - $ref: '#/components/schemas/Suitability'
      properties:
        actionSections:
          $ref: '#/components/schemas/actionSections'
    
    SuitabilityDecisionNotification:
      description: Schema for suitability decision notification data
      type: object
      required: [status, endDate, isApproved]
      properties:
        status:
          enum: [awaitingReview, inProgress, completed, notApplicable]
        isActionNeeded:
          type: boolean
        actionSections:
          $ref: '#/components/schemas/actionSections'
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        note:
          type: string
          minLength: 1
          maxLength: 2000
        isApproved:
          type: boolean
    
    DocReviewNotification:
      description: Schema for document review notification data
      type: object
      required: [eventType]
      allOf:
        - $ref: '#/components/schemas/DocumentReview'
      properties:
        actionSections:
          $ref: '#/components/schemas/actionSections'
    
    FundingActionNotification:
      description: Schema for funding action notification data
      type: object
      required: [eventType]
      allOf:
        - $ref: '#/components/schemas/TransferNotificationBase'
      properties:
        reason:
          type: string
          enum: [awaitingFundsFromCedingCompany, contactTheCarrier, fundingDiscrepancy, nigoAtCedingCarrier, noFundsReceivedCash, pendingReg60, other]
    
    TransferRequestNotification:
      description: Schema for transfer notification data
      type: object
      required: [eventType]
      allOf:
        - $ref: '#/components/schemas/TransferNotificationBase'
      properties:
        nextActivityDate:
          type: string
          format: date
        note:
          type: string
          minLength: 1
          maxLength: 2000
        methodOfInitiation:
          type: string
          enum: [fax, email, mail, replacement]
        referenceNumber:
          type: string        
        eventType:
          type: string
          const: transferRequest
    
    SourceTypeNotification:
      description: Schema for source type notification data
      type: object
      allOf:
        - $ref: '#/components/schemas/TransferNotificationBase'
    
    NewFollowUpNotification:
      description: Schema for new follow up notification data
      type: object
      required: [eventType]
      allOf:
        - $ref: '#/components/schemas/TransferNotificationBase'
      properties:
        nextActivityDate:
          type: string
          format: date
        note:
          type: string
          minLength: 1
          maxLength: 2000
        transferSentDate:
          type: string
          format: date
    
    FundingReceivedNotification:
      description: Schema for funding received notification data
      type: object
      required: [eventType]
      allOf:
        - $ref: '#/components/schemas/TransferNotificationBase'
      properties:
        anticipatedAmount:
          type: number
          format: float
        receivedAmount:
          type: number
          format: float
        receivedDate:
          type: string
          format: date
        status:
          type: string
          enum: [inProgress, complete]
        effectiveDate:
          type: string
          format: date
        eventType:
          type: string
          const: fundingReceived
    
    ApplicationCompletedNotification:
      description: Schema for application completed notification data
      type: object
      required: [eventType]
      properties:
        isActionNeeded:
          type: boolean
        actionSections:
          $ref: '#/components/schemas/actionSections'
        startDate:
          type: string
          format: date
        note:
          type: string
          minLength: 1
          maxLength: 2000
        delivery:
          type: object
          properties:
            sentDate:
              type: string
              format: date
            method:
              type: string
              enum: [fedex, ups, electronicDelivery, handDelivery, usps]
            trackingNumber:
              type: string
              minLength: 1
              maxLength: 65
    
    ApplicationCancelledNotification:
      description: Schema for application cancelled notification data
      type: object
      required: [eventType]
      properties:
        actionSections:
          $ref: '#/components/schemas/actionSections'
        initiator:
          type: string
          enum: [advisor, carrier, client]
        cancelledDate:
          type: string
          format: date
        reason:
          type: string
    
    TransferNotificationBase:
      description: Schema for policy funding data
      type: object
      required: [isActionNeeded, status]  
      properties:
        actionSections:
          $ref: '#/components/schemas/actionSections'
        startDate:
          type: string
          format: date
        isActionNeeded:
          type: boolean
        status:
          type: string
          enum: [awaitingReview, inProgress, completed]
        note:
          type: string
          minLength: 1
          maxLength: 2000
        sources:
          type: array
          items:
            type: object
            required: [method, type]
            properties:
              method:
                type: string
                enum:
                  - anotherPolicy
                  - check
                  - clearinghouse
                  - creditCard
                  - debitCard
                  - digitalPayment
                  - electronicFundTransfer
                  - payrollDeduction
                  - wireTransfer
              type:
                type: string
                enum:
                  - contribution
                  - directRollover
                  - employeeContribution
                  - employerContribution
                  - full1035Exchange
                  - indirectRollover
                  - nonQualifiedTransferOfAssets
                  - partial1035Exchange
                  - qualifiedTransfer
              isActionNeeded:
                type: boolean
              anticipatedAmount:
                type: number
                format: float
              status:
                type: string
                enum: [inProgress, complete]
              reason:
                type: string
                enum:
                  - awaitingFundsFromCedingCompany
                  - contactTheCarrier
                  - fundingDiscrepancy
                  - nigoAtCedingCarrier
                  - noFundsReceivedCash
                  - pendingReg60
                  - other
              effectiveDate:
                type: string
                format: date
              note:
                type: string
                minLength: 1
                maxLength: 2000
              cedingCompanyName:
                type: string
                minLength: 1
                maxLength: 180
                pattern: ^[a-zA-Z0-9=()*@#\s.,'_/~%$!();:&"®`\-\\?"]{1,180}$
              accountNumber:
                type: string
              startDate:
                type: string
                format: date



    ####### Models #######
    cusip:
      description: Generally used to identify financial instruments based on ABA standard CUSIP, but defined here with relaxed constraints to allow for annuity products that are not issued with standard ABA CUSIPs
      type: string
      minLength: 1
      pattern:  ^[0-9A-Za-z][0-9A-Za-z\-_]+[0-9A-Za-z]$
      examples:
        - standardCusip:
            description: ABA Standard CUSIP
            value: "401B23458"
    IndividualIdentity:
      description: Schema for individual identity data
      required: [firstName,lastName]
      type: object
      properties:
        type:
          type: string
          const: individual
        firstName:
          type: string
          minLength: 1
          maxLength: 105
          pattern: ^[a-zA-Z0-9=()*@#\s.,'_/~%$!();:&"®`\-\\?"]{1,105}$
        middleName:
          type: string
          minLength: 1
          maxLength: 105
          pattern: ^[a-zA-Z0-9=()*@#\s.,'_/~%$!();:&"®`\-\\?"]{1,105}$
        lastName:
          type: string
          minLength: 1
          maxLength: 105
          pattern: ^[a-zA-Z0-9=()*@#\s.,'_/~%$!();:&"®`\-\\?"]{1,105}$
        taxId:
          type: string
          maxLength: 9
    IndividualProducer:
      description: Schema for individual producer data
      type: object
      required: [relationships]
      allOf:
        - $ref: "#/components/schemas/IndividualIdentity"
        - type: object
          properties:
            npn:
              type: string
              maxLength: 10
            crdNumber:
              type: string
              maxLength: 10
            relationships:
              type: array
              minItems: 1
              maxItems: 30
              items:
                type: string
                enum:
                  - primaryAgent
                  - secondaryAgent
                  - additionalAgent
                  - investmentAdvisorRepresentative
    IndividualParty:
      description: Schema for individual party data
      type: object
      allOf:
        - $ref: "#/components/schemas/IndividualIdentity"
        - $ref: "#/components/schemas/PartyRelationship"
    EntityIdentity:
      description: Schema for entity identity data
      type: object
      required: [type, name]
      properties:
        type:
          type: string
          const: entity
        name:
          type: string
          minLength: 1
          maxLength: 180
          pattern: ^[a-zA-Z0-9=()*@#\s.,'_/~%$!();:&"®`\-\\?"]{1,180}$
        taxId:
          type: string
    EntityProducer:
      description: Schema for entity producer data
      type: object
      required: [relationships]
      allOf:
        - $ref: "#/components/schemas/EntityIdentity"
        - type: object
          properties:
            npn:
              type: string
              maxLength: 10
            crdNumber:
              type: string
              maxLength: 10
            relationships:
              type: array
              minItems: 1
              maxItems: 25
              items:
                type: string
                enum:
                  - brokerageGeneralAgency
                  - registeredInvestmentAdvisoryFirm
                  - independentMarketingOrganization
                  - brokerDealer
    EntityParty:
      description: Schema for entity party data
      type: object
      allOf:
        - $ref: "#/components/schemas/EntityIdentity"
        - $ref: "#/components/schemas/PartyRelationship"
    PartyRelationship:
      description: Schema for party relationship data
      type: object
      required: [relationships]
      properties:
        relationships:
          type: array
          minItems: 1
          maxItems: 2
          items:
            type: string
            enum:
              - owner
              - jointOwner
              - annuitant
              - jointAnnuitant
              - primaryBeneficiary
              - contingentBeneficiary
    Producers:
      description: Schema for producers data
      type: array
      items:
        anyOf:
          - $ref: "#/components/schemas/IndividualProducer"
          - $ref: "#/components/schemas/EntityProducer"
    CanSellValidation:
      description: Schema for policy can sell validation data
      type: object
      required: [status,isActionNeeded]
      properties:
        status:
          type: string
          enum: [awaitingReview, inProgress, completed]
        isActionNeeded:
          type: boolean
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        note:
          type: string
          minLength: 1
          maxLength: 2000
        issues:
          type: array
          items:
            type: object
            required: [type]
            properties:
              type:
                type: string
                enum:
                  - trainingIncompleteMissing
                  - trainingExpired
                  - agentNotAppointedForSale
                  - jitAppointmentInProgress
                  - agentNotLicensed
                  - other
              note:
                type: string
                minLength: 1
                maxLength: 2000
              affectedProducer:
                type: object
                properties:
                  npn:
                    type: string
                    maxLength: 10
                  crdNumber:
                    type: string
                    maxLength: 10
                  taxId:
                    type: string
                    maxLength: 9
    Suitability:
      description: Schema for policy suitability data
      type: object
      required: [status,isActionNeeded]
      properties:
        status:
          type: string
          enum: [awaitingReview, inProgress, completed, notApplicable]
        isActionNeeded:
          type: boolean
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        reason:
          type: string
          enum:
            - moreInformationNeeded
            - notSuitableForClient
            - other
        note:
          type: string
          minLength: 1
          maxLength: 2000
        dueDate:
          type: string
          format: date
        isApproved:
          description: If status is completed, this field denotes whether suitability was approved or declined
          type: boolean
    DocumentReview:
      description: Schema for policy document review data
      type: object
      required: [status,isActionNeeded]
      properties:
        status:
          type: string
          enum: [awaitingReview, inProgress, completed]
        isActionNeeded:
          type: boolean
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        note:
          type: string
          minLength: 1
          maxLength: 2000
        issues:
          type: array
          items:
            type: object
            properties:
              reason:
                type: string
                enum:
                  - applicationIssue
                  - contactCarrier
                  - incompleteForm
                  - missingForm
                  - missingSignature
                  - needClarity
                  - other
              formName:
                type: string
                minLength: 1
                maxLength: 200
              formNumber:
                type: string
                minLength: 1
                maxLength: 100
              dueDate:
                type: string
                format: date
              note:
                type: string
                minLength: 1
                maxLength: 2000
    applicationOrigin:
      type: object
      required: [isElectronic]
      properties:
        platform:
          type: string
          maxLength: 50
        isElectronic:
          type: boolean
        id:
          type: string
          maxLength: 65


    notificationMetadata:
      type: object
      required: [status, eventId, policyNumber, applicationOrigin]
      properties:
        eventId:
          type: string
          description: Unique identifier for this notification event
        policyNumber:
          type: string
        associatedFirmId:
          type: string
        applicationOrigin:
          $ref: '#/components/schemas/applicationOrigin'
        status:
          $ref: '#/components/schemas/notificationStatus'
