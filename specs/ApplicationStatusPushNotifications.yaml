openapi: 3.1.0
info:
  title: Annuity Application Status Push Notifications
  description: Webhooks for notifying about changes in annuity application status
  version: 1.0.0
  license:
    name: MIT
    url: https://github.com/Insured-Retirement-Institute/Pending-Case/blob/main/LICENSE


webhooks:
  applicationReceived:
    post:
      summary: Initial Application Received Notification
      description: Webhook fired when a new application is received and a policy number is assigned
      tags:
        - Application Notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [eventType,notification]
              allOf:
                - $ref: '#/components/schemas/notificationMetadata'
              properties:
                eventType:
                  type: string
                  const: applicationStatus.v1.applicationReceived
                notification:
                  $ref: '#/components/schemas/ApplicationReceivedNotification'
      responses:
        "200":
          description: Notification received successfully
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
  
  canSellActionNeeded:
    post:
      summary: Can Sell Action Needed Notification
      description: Webhook fired when can-sell action is needed
      tags:
        - Validation Notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [eventType, notification]
              allOf:
                - $ref: '#/components/schemas/notificationMetadata'
              properties:
                eventType:
                  type: string
                  const: applicationStatus.v1.canSellActionNeeded
                notification:
                  $ref: '#/components/schemas/CanSellNotification'
      responses:
        "200":
          description: Notification received successfully
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
  
  suitabilityActionNeeded:
    post:
      summary: Suitability Action Needed Notification
      description: Webhook fired when suitability review requires action
      tags:
        - Suitability Notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [eventType, notification]
              allOf:
                - $ref: '#/components/schemas/notificationMetadata'
              properties:
                eventType:
                  type: string
                  const: applicationStatus.v1.suitabilityActionNeeded
                notification:
                  $ref: '#/components/schemas/SuitabilityActionNotification'
      responses:
        "200":
          description: Notification received successfully
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
  
  suitabilityApproved:
    post:
      summary: Suitability Approved Notification
      description: Webhook fired when suitability is approved
      tags:
        - Suitability Notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [eventType, notification]
              allOf:
                - $ref: '#/components/schemas/notificationMetadata'
              properties:
                eventType:
                  type: string
                  const: applicationStatus.v1.suitabilityApproved
                notification:
                  $ref: '#/components/schemas/SuitabilityDecisionNotification'
      responses:
        "200":
          description: Notification received successfully
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
  
  documentReviewActionNeeded:
    post:
      summary: Document Review Action Needed Notification
      description: Webhook fired when document review requires action
      tags:
        - Document Notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [eventType, notification]
              allOf:
                - $ref: '#/components/schemas/notificationMetadata'
              properties:
                eventType:
                  type: string
                  const: applicationStatus.v1.documentReviewActionNeeded
                notification:
                  $ref: '#/components/schemas/DocReviewNotification'
      responses:
        "200":
          description: Notification received successfully
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
  
  fundingActionNeeded:
    post:
      summary: Funding Action Needed Notification
      description: Webhook fired when funding action is needed
      tags:
        - Funding Notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [eventType, notification]
              allOf:
                - $ref: '#/components/schemas/notificationMetadata'
              properties:
                eventType:
                  type: string
                  const: applicationStatus.v1.fundingActionNeeded
                notification:
                  $ref: '#/components/schemas/FundingActionNotification'
      responses:
        "200":
          description: Notification received successfully
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
  
  fundingTransferRequestSent:
    post:
      summary: Funding Transfer Request Sent Notification
      description: Webhook fired when a funding transfer request is sent
      tags:
        - Transfer Notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [eventType, notification]
              allOf:
                - $ref: '#/components/schemas/notificationMetadata'
              properties:
                eventType:
                  type: string
                  const: applicationStatus.v1.fundingTransferRequestSent
                notification:
                  $ref: '#/components/schemas/TransferRequestNotification'
      responses:
        "200":
          description: Notification received successfully
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
  
  fundingSourceTypeUpdated:
    post:
      summary: Funding Source Type Updated Notification
      description: Webhook fired when funding source type is determined
      tags:
        - Funding Notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [eventType, notification]
              allOf:
                - $ref: '#/components/schemas/notificationMetadata'
              properties:
                eventType:
                  type: string
                  const: applicationStatus.v1.fundingSourceTypeUpdated
                notification:
                  $ref: '#/components/schemas/SourceTypeNotification'
      responses:
        "200":
          description: Notification received successfully
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
  
  fundingTransferFollowedUp:
    post:
      summary: New Funding Follow-Up Notification
      description: Webhook fired when a new follow-up action is created
      tags:
        - Follow-Up Notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [eventType, notification]
              allOf:
                - $ref: '#/components/schemas/notificationMetadata'
              properties:
                eventType:
                  type: string
                  const: applicationStatus.v1.fundingTransferFollowedUp
                notification:
                  $ref: '#/components/schemas/NewFollowUpNotification'
      responses:
        "200":
          description: Notification received successfully
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
  
  fundingReceived:
    post:
      summary: Funding Received Notification
      description: Webhook fired when funding is received
      tags:
        - Funding Notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [eventType, notification]
              allOf:
                - $ref: '#/components/schemas/notificationMetadata'
              properties:
                eventType:
                  type: string
                  const: applicationStatus.v1.fundingReceived
                notification:
                  $ref: '#/components/schemas/FundingReceivedNotification'
      responses:
        "200":
          description: Notification received successfully
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
  
  applicationCompleted:
    post:
      summary: Application Completed Notification
      description: Webhook fired when an application is completed
      tags:
        - Application Notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [eventType, notification]
              allOf:
                - $ref: '#/components/schemas/notificationMetadata'
              properties:
                eventType:
                  type: string
                  const: applicationStatus.v1.applicationCompleted
                notification:
                  $ref: '#/components/schemas/ApplicationCompletedNotification'
      responses:
        "200":
          description: Notification received successfully
        "401":
